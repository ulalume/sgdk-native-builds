name: sync

# Pre-build coverage. The discover job plans the build set from four sources:
#   1. Every SGDK tag >= v1.70 (first with common.mk).
#   2. The latest master commit (rolling "bleeding edge" -> master-<sha>, always kept so
#      `setup --version master`-style use always has a build; gets the Latest badge).
#   3. NEW build-relevant master commits since the newest master-<sha> we've already built
#      (FORWARD-ONLY, path-filtered): any commit in <baseline>..master that touches a build
#      input (src/inc/res/tools/common.mk/md.ld/makelib.gen/makefile.gen) becomes its own
#      master-<sha>. This captures intermediate master states between cron runs without
#      rebuilding commits that don't change the bundle (docs, samples, .bat, etc.). We do NOT
#      backfill history before the baseline — only commits newer than what we've built.
#   4. Any EXISTING release missing a platform asset (so releases cut before a platform
#      existed — e.g. windows — get backfilled).
# Builds the gaps by calling build.yml (workflow_call); build.yml's --clobber upload fills in
# only the missing platforms. Any other commit is built on-demand via build.yml's
# workflow_dispatch.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # weekly, Monday 06:00 UTC

permissions:
  contents: write

env:
  SGDK_REPO: "Stephane-D/SGDK"
  # SGDK paths whose changes can affect the built bundle (libmd.a / native tools / shipped
  # makefiles). A master commit touching ANY of these is built as its own master-<sha>;
  # commits touching only docs/samples/.bat/etc. are skipped as build-identical.
  #   src        -> library C/asm/z80 sources (incl. src/boot)
  #   inc res    -> library headers + resources
  #   tools      -> native tools we compile (xgmtool/bintos/convsym)
  #   common.mk  -> shared make rules (libmd build + shipped user build)
  #   md.ld      -> linker script (shipped, used at user link time)
  #   makelib.gen-> libmd.a build recipe (used directly by build.yml)
  #   makefile.gen-> shipped user-project build recipe (drives `sgdkx make`)
  BUILD_PATHS: "src inc res tools common.mk md.ld makelib.gen makefile.gen"

jobs:
  discover:
    name: discover refs to build
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      # Treeless clone: commits + trees, no blobs. Enough for `git log <range> -- <paths>`
      # (path filtering diffs trees, never reads blob contents) -> cheap and no on-demand fetch.
      - name: Clone SGDK history (treeless) for master-range filtering
        shell: bash
        run: |
          set -ex
          git clone --filter=blob:none --no-checkout "https://github.com/${SGDK_REPO}.git" sgdk-src

      - name: Plan refs to build
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -ex

          # SGDK tags from v1.70 (first with common.mk) upward: v1.70/1.80/1.90 + v2.x+.
          # Excludes v1.65 and older (different build structure / pre-common.mk).
          tags=$(gh api --paginate "repos/${SGDK_REPO}/tags" --jq '.[].name' | grep -E '^v(1\.[789]0|[2-9][0-9]*\.[0-9])' || true)
          # latest master commit -> rolling per-commit release tag
          master_sha=$(gh api "repos/${SGDK_REPO}/commits/master" --jq '.sha')
          master_tag="master-${master_sha:0:8}"

          # releases that already exist in THIS repo
          existing=$(gh release list --repo "${GITHUB_REPOSITORY}" --limit 1000 --json tagName --jq '.[].tagName' || true)
          # EXISTING releases missing >=1 platform bundle (sgdk-<tag>-<platform>.tar.gz) — one API
          # call; jq flags any release whose assets don't cover all 5 platforms (backfill targets).
          incomplete=$(gh api --paginate "repos/${GITHUB_REPOSITORY}/releases" --jq '
            .[] | .tag_name as $t | (.assets | map(.name)) as $have
            | if (["linux-x86_64","linux-arm64","macos-arm64","macos-x86_64","windows-x86_64"]
                  | all(. as $p | $have | index("sgdk-\($t)-\($p).tar.gz")))
              then empty else $t end' || true)

          # --- FORWARD-ONLY path-filtered master commit coverage ---
          # baseline = newest master commit we've ALREADY built (walk master newest-first, first
          # already-built commit wins). We add only build-relevant commits NEWER than it — never
          # backfill older history. If we've built no master commit yet (or the newest built one
          # isn't on current master, e.g. after a force-push), baseline stays empty and we add
          # nothing extra; the master_tag item above still seeds HEAD as the next baseline.
          built_master=$(printf '%s\n' "$existing" | sed -n 's/^master-//p' | grep -v '^$' || true)
          baseline=""
          if [ -n "$built_master" ]; then
            while IFS= read -r full; do
              if grep -qxF "${full:0:8}" <<<"$built_master"; then baseline="$full"; break; fi
            done < <(git -C sgdk-src rev-list origin/master)
          fi
          newmaster_tags=""
          if [ -n "$baseline" ]; then
            # commits in baseline..master (baseline excluded) touching a build input -> master-<sha8>
            newmaster_tags=$(git -C sgdk-src log --format='%H' "${baseline}..origin/master" -- $BUILD_PATHS \
                             | grep -v '^$' | sed 's/^\(........\).*/master-\1/' || true)
          fi

          # Candidates = upstream tags + latest master + new build-relevant master commits + every
          # existing release (dedup, drop blanks). Quoted vars keep each tag on its own line.
          candidates=$(printf '%s\n' "$tags" "$master_tag" "$newmaster_tags" "$existing" | sort -u | grep -v '^$' || true)

          items=()
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            # ref to build: master-<sha> -> <sha> ; version tag -> itself
            case "$tag" in master-*) ref="${tag#master-}" ;; *) ref="$tag" ;; esac
            # build if NOT yet released, OR released-but-incomplete; skip released-and-complete
            if grep -qxF "$tag" <<<"$existing"; then
              grep -qxF "$tag" <<<"$incomplete" || continue
            fi
            items+=("{\"ref\":\"$ref\",\"tag\":\"$tag\"}")
          done <<<"$candidates"

          if [ "${#items[@]}" -eq 0 ]; then
            matrix='[]'
          else
            matrix="[$(printf '%s\n' "${items[@]}" | paste -sd, -)]"
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "planned build set: $matrix"

  build:
    name: build ${{ matrix.tag }}
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include: ${{ fromJson(needs.discover.outputs.matrix) }}
    uses: ./.github/workflows/build.yml
    with:
      sgdk_ref: ${{ matrix.ref }}
      release_tag: ${{ matrix.tag }}
